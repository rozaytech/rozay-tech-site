<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayAdmin | NOC Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dash-style.css"> </head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-admin">Rozay<span>Admin</span></div>
        <nav>
            <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Painel Geral</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-bolt"></i> Novas Vendas <span class="badge-count" id="countBadge">0</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Clientes & Redes</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-file-invoice-dollar"></i> Faturação</a>
            <hr>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Voltar ao Site</a>
            <a href="#" class="nav-item logout"><i class="fa-solid fa-power-off"></i> Sair</a>
        </nav>
    </aside>

    <main class="main-dash">
        <header class="dash-header">
            <button class="menu-toggle" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
            <div class="welcome-text">
                <h1 id="greeting">Boa tarde, Admin!</h1>
                <p class="live-date" id="liveClock">--/--/-- • 00:00:00</p>
            </div>
            <div class="user-profile">
                <div class="user-info"><span>Admin</span><small>NOC Master</small></div>
                <div class="avatar">A</div>
            </div>
        </header>

        <section class="content-body">
            <div class="card table-card">
                <div class="card-header">
                    <h3>Interessados no Site (Leads)</h3>
                </div>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Interesse / Data</th>
                                <th>Cliente / Localização</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="leadsTable">
                            </tbody>
                    </table>
                </div>
                <div id="loaderTable" class="loader-status">Sincronizando com o Firebase...</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAe-UYZc4-K94cfrSTDqkG8_UjBjFpJ_-U", 
            authDomain: "rozaytech-noc.firebaseapp.com", 
            databaseURL: "https://rozaytech-noc-default-rtdb.firebaseio.com", 
            projectId: "rozaytech-noc" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Relógio e Saudação
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleString('pt-MZ');
            const hour = now.getHours();
            const greet = hour < 12 ? "Bom dia" : hour < 18 ? "Boa tarde" : "Boa noite";
            document.getElementById('greeting').innerText = `${greet}, Admin!`;
        }, 1000);

        // 2. Escutar os Leads em tempo real
        const tableBody = document.getElementById('leadsTable');
        const badge = document.getElementById('countBadge');
        const loader = document.getElementById('loaderTable');

        onValue(ref(db, 'leads'), (snapshot) => {
            tableBody.innerHTML = "";
            loader.style.display = "none";

            if (snapshot.exists()) {
                const data = snapshot.val();
                const entries = Object.entries(data).reverse();
                
                // Atualiza o contador de "Novas Vendas" no menu lateral
                badge.innerText = entries.length;

                entries.forEach(([id, lead]) => {
                    const row = `
                        <tr>
                            <td>
                                <span class="badge-tag">${lead.servico || 'Geral'}</span><br>
                                <small class="text-muted">${lead.data || ''}</small>
                            </td>
                            <td>
                                <div class="client-name">${lead.nome || 'Interessado'}</div>
                                <div class="client-loc"><i class="fa-solid fa-location-dot"></i> ${lead.local || 'N/A'}</div>
                            </td>
                            <td>
                                <a href="https://wa.me/${lead.whatsapp?.replace(/\D/g, '')}" target="_blank" class="btn-whatsapp">
                                    <i class="fa-brands fa-whatsapp"></i> Atender
                                </a>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='3' class='empty'>Nenhum lead registado.</td></tr>";
                badge.innerText = "0";
            }
        });

        // 3. Toggle Menu Mobile
        document.getElementById('menuBtn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('active');
        };
    </script>
</body>
</html>
