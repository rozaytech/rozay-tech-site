<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayAdmin | NOC Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* CSS INTEGRADO PARA GARANTIR A ESTÉTICA */
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f4f7fe; --white: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--dark); overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); transition: 0.3s; z-index: 1000; padding: 25px; }
        .sidebar.active { left: 0; }
        .logo-admin { color: #fff; font-size: 22px; font-weight: bold; margin-bottom: 40px; display: block; text-decoration: none; }
        .logo-admin span { color: var(--primary); }
        .nav-item { display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-item i { margin-right: 15px; width: 20px; }
        .nav-item.active, .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .badge-count { background: #ff4757; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }

        /* MAIN CONTENT */
        .main-dash { padding: 25px; transition: 0.3s; }
        .dash-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .menu-toggle { background: var(--primary); color: #fff; border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .welcome-text h1 { font-size: 24px; margin-bottom: 5px; }
        .live-date { font-size: 14px; opacity: 0.6; }

        /* CARDS */
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* PROFILE CARD */
        .profile-card { display: flex; align-items: center; justify-content: space-between; max-width: 350px; }
        .user-info strong { display: block; font-size: 18px; }
        .user-info span { font-size: 13px; opacity: 0.6; }
        .avatar-circle { width: 50px; height: 50px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* TABLE */
        .table-card h3 { margin-bottom: 20px; font-size: 18px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 15px 10px; font-size: 12px; text-transform: uppercase; color: #94a3b8; border-bottom: 1px solid #eee; }
        td { padding: 15px 10px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .td-service { font-weight: bold; color: var(--dark); }
        .td-date { font-size: 11px; opacity: 0.5; margin-top: 4px; }
        .td-name { font-weight: 600; }
        .td-loc { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .link-atender { color: var(--primary); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* FAB */
        .fab-add { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: #fff; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }

        @media (max-width: 768px) {
            .profile-card { max-width: 100%; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <a href="#" class="logo-admin">Rozay<span>Admin</span></a>
        <nav>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Voltar ao Site</a>
            <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Painel Geral</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-bolt"></i> Novas Vendas <span class="badge-count" id="countBadge">0</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Clientes & Redes</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-file-invoice-dollar"></i> Faturação</a>
            <a href="#" class="nav-item logout" style="margin-top: 50px; color: #ff4757;"><i class="fa-solid fa-power-off"></i> Sair</a>
        </nav>
    </aside>

    <main class="main-dash">
        <header class="dash-header">
            <button class="menu-toggle" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
            <div class="welcome-text">
                <h1 id="greeting">Boa tarde, Admin!</h1>
                <p class="live-date" id="liveClock">--/--/-- • 00:00:00</p>
            </div>
        </header>

        <div class="card profile-card">
            <div class="user-info">
                <strong>Admin</strong>
                <span>NOC Master</span>
            </div>
            <div class="avatar-circle">A</div>
        </div>

        <div class="card table-card">
            <h3>Interessados no Site (Leads)</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Interesse / Data</th>
                            <th>Cliente / Localização</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTable"></tbody>
                </table>
            </div>
            <div id="loaderTable" style="text-align:center; padding:20px; opacity:0.5; font-size:12px;">Sincronizando...</div>
        </div>

        <button class="fab-add"><i class="fa-solid fa-plus"></i></button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAe-UYZc4-K94cfrSTDqkG8_UjBjFpJ_-U", 
            authDomain: "rozaytech-noc.firebaseapp.com", 
            databaseURL: "https://rozaytech-noc-default-rtdb.firebaseio.com", 
            projectId: "rozaytech-noc" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Sidebar Toggle
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.onclick = (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('active');
        }
        document.onclick = () => sidebar.classList.remove('active');

        // Relógio
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleString('pt-MZ');
        }, 1000);

        // Firebase Data
        const tableBody = document.getElementById('leadsTable');
        const badge = document.getElementById('countBadge');
        const loader = document.getElementById('loaderTable');

        onValue(ref(db, 'leads'), (snapshot) => {
            tableBody.innerHTML = "";
            loader.style.display = "none";
            if (snapshot.exists()) {
                const entries = Object.entries(snapshot.val()).reverse();
                badge.innerText = entries.length;
                entries.forEach(([id, lead]) => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>
                                <div class="td-service">${lead.servico || 'Redes'}</div>
                                <div class="td-date">${lead.data || ''}</div>
                            </td>
                            <td>
                                <div class="td-name">${lead.nome || 'RCAS'}</div>
                                <div class="td-loc"><i class="fa-solid fa-location-dot"></i> ${lead.local || 'Pemba'}</div>
                            </td>
                            <td>
                                <a href="https://wa.me/${lead.whatsapp?.replace(/\D/g, '')}" target="_blank" class="link-atender">
                                    <i class="fa-brands fa-whatsapp"></i> Atender
                                </a>
                            </td>
                        </tr>`;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:30px;'>Sem leads ativos.</td></tr>";
            }
        });
    </script>
</body>
</html>
