<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayAdmin | NOC Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dash-style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-admin">Rozay<span>Admin</span></div>
        <nav>
            <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Painel Geral</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-bolt"></i> Novas Vendas <span class="badge-count" id="countBadge">0</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Clientes & Redes</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-file-invoice-dollar"></i> Faturação</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-clipboard-check"></i> Auditoria</a>
            <a href="#" class="nav-item"><i class="fa-solid fa-tower-broadcast"></i> Infraestrutura</a>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> Voltar ao Site</a>
            <a href="#" class="nav-item logout"><i class="fa-solid fa-power-off"></i> Sair</a>
        </nav>
    </aside>

    <main class="main-dash">
        <header class="dash-header">
            <button class="menu-toggle" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
            <div class="welcome-text">
                <h1 id="greeting">Boa tarde, Admin!</h1>
                <p class="live-date" id="liveClock">04/03/2026, 12:33:32</p>
            </div>
        </header>

        <div class="card profile-card">
            <div class="profile-content">
                <div class="user-info">
                    <strong>Admin</strong>
                    <span>NOC Master</span>
                </div>
                <div class="avatar-circle">A</div>
            </div>
        </div>

        <div class="card table-card">
            <h3>Interessados no Site (Leads)</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Interesse / Data</th>
                            <th>Cliente / Localização</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTable">
                        </tbody>
                </table>
            </div>
            <div id="loaderTable" style="text-align:center; padding:20px; color:#94a3b8; font-size:12px;">
                Sincronizando com o Firebase...
            </div>
        </div>
        
        <button class="fab-add"><i class="fa-solid fa-plus"></i></button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAe-UYZc4-K94cfrSTDqkG8_UjBjFpJ_-U", 
            authDomain: "rozaytech-noc.firebaseapp.com", 
            databaseURL: "https://rozaytech-noc-default-rtdb.firebaseio.com", 
            projectId: "rozaytech-noc" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // RELÓGIO
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleString('pt-MZ');
        }, 1000);

        // SIDEBAR TOGGLE
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        menuBtn.onclick = () => sidebar.classList.toggle('active');

        // LEITURA DE DADOS
        const tableBody = document.getElementById('leadsTable');
        const badge = document.getElementById('countBadge');
        const loader = document.getElementById('loaderTable');

        onValue(ref(db, 'leads'), (snapshot) => {
            tableBody.innerHTML = "";
            loader.style.display = "none";

            if (snapshot.exists()) {
                const data = snapshot.val();
                const entries = Object.entries(data).reverse();
                badge.innerText = entries.length;

                entries.forEach(([id, lead]) => {
                    const row = `
                        <tr>
                            <td>
                                <div class="td-service">${lead.servico || 'Redes'}</div>
                                <div class="td-date">${lead.data || ''}</div>
                            </td>
                            <td>
                                <div class="td-name">${lead.nome || 'RCAS'}</div>
                                <div class="td-loc"><i class="fa-solid fa-location-dot"></i> ${lead.local || 'Pemba'}</div>
                            </td>
                            <td>
                                <a href="https://wa.me/${lead.whatsapp?.replace(/\D/g, '')}" target="_blank" class="link-atender">
                                    <i class="fa-brands fa-whatsapp"></i> Atender
                                </a>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px;'>Sem leads.</td></tr>";
                badge.innerText = "0";
            }
        });
    </script>
</body>
</html>
