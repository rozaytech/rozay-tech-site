<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozay Tech | Conectividade de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --primary: #2563eb;
            --border: rgba(255,255,255,0.1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --primary: #2563eb;
            --border: rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER & NAV */
        header {
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--primary); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .time-box { font-size: 14px; font-weight: 600; color: var(--primary); }
        
        .theme-toggle, .login-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* HERO */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 10%;
            margin-top: 50px;
        }

        .hero h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: var(--text-dim); max-width: 700px; margin-bottom: 40px; }

        /* LEAD FORM */
        .lead-section { padding: 80px 5%; display: flex; justify-content: center; }
        .lead-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .lead-card h2 { margin-bottom: 25px; text-align: center; }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        .btn-send {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        #msgStatus { margin-top: 15px; text-align: center; display: none; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Rozay<span>Tech</span></div>
        <div class="nav-right">
            <div id="real-time" class="time-box">00:00:00</div>
            <button class="theme-toggle" id="theme-btn"><i class="fa-solid fa-moon"></i></button>
            <a href="login.html" class="login-btn"><i class="fa-solid fa-lock"></i> Login</a>
        </div>
    </header>

    <section class="hero">
        <h1>O seu NOC de confiança em Moçambique.</h1>
        <p>Monitorização de rede 24/7 e suporte especializado. Garantimos que a sua empresa esteja sempre online.</p>
        <a href="#leads" class="btn-send" style="max-width: 250px; text-decoration: none; text-align: center;">Pedir Orçamento</a>
    </section>

    <section id="leads" class="lead-section">
        <div class="lead-card">
            <h2>Auditoria Gratuita</h2>
            <form id="leadForm">
                <input type="text" id="name" placeholder="Nome / Empresa" required>
                <input type="tel" id="phone" placeholder="WhatsApp" required>
                <select id="service">
                    <option value="Starlink">Starlink Business</option>
                    <option value="PtP">Link Ponto a Ponto</option>
                    <option value="NOC">Gestão NOC 24/7</option>
                </select>
                <textarea id="details" rows="3" placeholder="Localização do site..."></textarea>
                <button type="submit" class="btn-send" id="submitBtn">Enviar Solicitação</button>
                <div id="msgStatus"></div>
            </form>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAe-UYZc4-K94cfrSTDqkG8_UjBjFpJ_-U",
            authDomain: "rozaytech-noc.firebaseapp.com",
            databaseURL: "https://rozaytech-noc-default-rtdb.firebaseio.com",
            projectId: "rozaytech-noc",
            storageBucket: "rozaytech-noc.firebasestorage.app",
            messagingSenderId: "129382246448",
            appId: "1:129382246448:web:f0ce1b7fca23eed17da5f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // RELÓGIO EM TEMPO REAL
        setInterval(() => {
            document.getElementById('real-time').innerText = new Date().toLocaleTimeString('pt-MZ');
        }, 1000);

        // DARK/LIGHT MODE
        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = () => {
            const current = document.body.getAttribute('data-theme');
            if (current === 'light') {
                document.body.removeAttribute('data-theme');
                themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        };

        // ENVIO DO FORMULÁRIO
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('msgStatus');
            btn.innerText = "A enviar...";
            
            const data = {
                nome: document.getElementById('name').value,
                telefone: document.getElementById('phone').value,
                interesse: document.getElementById('service').value,
                detalhes: document.getElementById('details').value,
                data: new Date().toLocaleString('pt-MZ'),
                status: 'Pendente'
            };

            try {
                await push(ref(db, 'leads'), data);
                status.style.display = 'block';
                status.style.background = '#10b98122';
                status.style.color = '#10b981';
                status.innerText = "Solicitação enviada com sucesso!";
                e.target.reset();
            } catch {
                status.style.display = 'block';
                status.style.background = '#ef444422';
                status.style.color = '#ef4444';
                status.innerText = "Erro ao enviar. Tente novamente.";
            } finally {
                btn.innerText = "Enviar Solicitação";
            }
        };
    </script>
</body>
</html>
