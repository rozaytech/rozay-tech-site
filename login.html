<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayAdmin | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .logo span { color: var(--primary); }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #1d4ed8; transform: translateY(-2px); }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 16px; display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; }
        .back-site { display: inline-block; margin-top: 24px; color: #64748b; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Rozay<span>Admin</span></div>
        <div class="subtitle">Controlo de Engenharia</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Utilizador</label>
                <input type="text" id="username" required placeholder="Utilizador admin">
            </div>
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Aceder ao Painel</button>
            <div id="errorMessage" class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Acesso Negado.</div>
        </form>
        <a href="index.html" class="back-site"><i class="fa-solid fa-arrow-left"></i> Voltar ao site público</a>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            if(document.getElementById('username').value === "admin" && 
               document.getElementById('password').value === "rozay2026") {
                localStorage.setItem('rozay_auth', 'true');
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        };
    </script>
</body>
</html>
