<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayTech | Login NOC</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 24px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .logo span { color: #2563eb; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Rozay<span>Tech</span></div>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Utilizador" required>
            <input type="password" id="pass" placeholder="Palavra-passe" required>
            <button type="submit">Aceder ao NOC</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if((u === 'engenheiro' || u === 'faume') && p === 'rozay2024') {
                localStorage.setItem('rozay_auth', 'true');
                localStorage.setItem('rozay_user', u.charAt(0).toUpperCase() + u.slice(1));
                window.location.href = 'dashboard.html';
            } else { alert('Acesso Negado!'); }
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
