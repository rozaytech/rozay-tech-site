<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozayTech | Login NOC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .logo span { color: #2563eb; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Rozay<span>Admin</span></div>
        <p style="color: #94a3b8; font-size: 14px;">NOC & ERP System</p>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Utilizador" required>
            <input type="password" id="pass" placeholder="Palavra-passe" required>
            <button type="submit">Entrar no Sistema</button>
            <div id="error" class="error-msg">Acesso Negado. Verifique as credenciais.</div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            if((u === 'admin' || u === 'faume') && p === 'rozay2026') {
                localStorage.clear();
                localStorage.setItem('rozay_auth', 'true');
                localStorage.setItem('rozay_user', u.charAt(0).toUpperCase() + u.slice(1));
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        };
    </script>
</body>
</html>
